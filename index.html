<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>MCT — Math Chiptune Tracker</title>
  <meta
    name="description"
    content="MCT is a browser-based 8-bit loop maker with math generation, tracker editing, A/B compare, channel lock, MP3 approximation, and tiny HTML export."
  />

  <!-- GitHub Pages entry point.
       Keep the main app as mct.html and redirect visitors there. -->
  <meta http-equiv="refresh" content="0; url=./mct.html" />

  <style>
    :root {
      --bg: #0f1219;
      --panel: #171b25;
      --text: #eef3ff;
      --muted: #9aa8c7;
      --accent: #7cf7c2;
      --line: #2e364b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 0%, rgba(124, 247, 194, 0.14), transparent 34%),
        radial-gradient(circle at 80% 12%, rgba(128, 167, 255, 0.16), transparent 38%),
        var(--bg);
    }

    main {
      width: min(560px, calc(100% - 32px));
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: rgba(23, 27, 37, 0.88);
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.32);
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 5vw, 42px);
      letter-spacing: -0.04em;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.55;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 18px;
      border-radius: 999px;
      color: #07100d;
      background: var(--accent);
      text-decoration: none;
      font-weight: 850;
    }

    small {
      display: block;
      margin-top: 14px;
      color: var(--muted);
      font-size: 12px;
    }
  </style>

  <script>
    // Preserve query string and hash when redirecting.
    const target = "./mct.html" + window.location.search + window.location.hash;
    window.location.replace(target);
  </script>
</head>
<body>
  <main>
    <h1>MCT</h1>
    <p>
      Math Chiptune Tracker를 여는 중입니다.<br />
      자동으로 이동하지 않으면 아래 버튼을 클릭하세요.
    </p>
    <a href="./mct.html">Open MCT</a>
    <small>GitHub Pages entry: index.html → mct.html</small>
  </main>
</body>
</html>
